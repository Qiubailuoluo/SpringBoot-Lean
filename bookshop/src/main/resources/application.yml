spring:
  application:
    name: bookshop
  profiles:
    active: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

security:
  jwt:
    # Base64 编码密钥（开发演示用）；生产请改为环境变量并定期轮换。
    secret: bXlfYm9va3Nob3BfZGVtb19qd3Rfc2VjcmV0X2tleV8yMDI2XzA0XzE0
    access-expire-seconds: 1800
    refresh-expire-seconds: 604800
  verification:
    # mock: 本地随机码联调；real: 真实渠道占位（real-stub，后续接厂商）
    mode: mock
    # 是否在响应体中返回验证码明文（仅建议开发联调开启）。
    expose-code: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
